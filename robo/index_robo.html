<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniGeek Robot v15.5 - Professional Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="modal-overlay" id="overlay"></div>
    
    <div id="viewerModal">
        <h3>📄 Código: <span id="fileNameModal" style="color:var(--orange);"></span> 
            <button id="btnCopiarCodigo" style="background:var(--orange); color:white; font-size:11px; float:right; border-radius:4px; border:none; padding:4px 8px; cursor:pointer;">Copiar</button>
        </h3>
        <textarea id="modalTextarea" readonly style="height: 75%; width: 100%; margin-top:10px;"></textarea>
        <button id="btnFecharModal" style="background:var(--danger); color:white; width:100%; margin-top:10px">Fechar</button>
    </div>

    <div class="main-layout">
        <div class="content">
            <h2>🤖 AniGeek Robot v15.5</h2>
            
            <div class="card">
                <h3>1. Injeção de Dados (Cloud Templates)</h3>
                <textarea id="inputRecomendacao" placeholder="JS de Recomendação..."></textarea>
                <textarea id="inputCSS" style="margin-top:10px" placeholder="CSS Modelo..."></textarea>
                <textarea id="templateHtml" style="margin-top:10px" placeholder="HTML Template..."></textarea>
                <button class="btn-admin" id="btnSalvarTemplates">☁️ Salvar Alterações nos Templates</button>
            </div>

            <div class="card">
                <h3>2. Execução em Lote</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <select id="targetProject"><option value="todos">Todos os Projetos</option></select>
                    <input type="text" id="fileName" placeholder="IDs (Ex: horimiya, solo-leveling)">
                    <select id="tipoColecao">
                        <option value="filme">Filme</option>
                        <option value="serie">Série</option>
                        <option value="game">Game</option>
                        <option value="anime">Anime</option>
                        <option value="noticia">Notícia</option>
                    </select>
                </div>
                <button class="btn-gen" id="btnCriarArquivos">⚙️ GERAR ARQUIVOS LOCAIS</button>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top:10px;">
                    <button class="btn-zip" id="btnBaixarZip">📦 BAIXAR .ZIP</button>
                    <button class="btn-db" id="btnSyncFirestore">🚀 SYNC FIRESTORE</button>
                </div>
            </div>

            <div class="card">
                <h3>3. Logs & Terminal</h3>
                <button id="btnCopiarTerminal" class="btnCopiar">📋 Copiar Terminal</button>
                <div id="consoleLog" class="log">Iniciando núcleo v15.5...</div>
                <div class="terminal-input">
                    <input type="text" id="termCmd" placeholder="Comando (ex: comparar-versoes v14 v15)">
                    <button class="btn-term" id="btnExecutarTerm">EXECUTAR</button>
                </div>
            </div>

            <div class="card" style="border-top: 2px solid var(--accent)">
                <h3>5. Registro Manual de Versão</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="regVersao" placeholder="Nome da Versão (ex: v16)">
                    <input type="text" id="regAutor" placeholder="Autor (Opcional)">
                </div>
                <textarea id="regChangelog" style="height: 60px;" placeholder="Descreva as alterações..."></textarea>
                <button class="btn-reg" id="btnRegManual">💾 Registrar Versão Atual</button>
            </div>

            <div class="card admin-section" style="border-top: 1px solid var(--admin)">
                <h3>⚙️ Configuração de Editores</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <input type="text" id="admId" placeholder="ID (ex: geek-news)">
                    <input type="text" id="admDom" placeholder="Domínio (ex: geek.web.app)">
                    <input type="text" id="admPath" placeholder="Caminho Base (/)">
                </div>
                <button class="btn-admin" id="btnAdicionarEditor">➕ Salvar Editor</button>
                <div id="listaEditoresAdm" style="margin-top:10px; font-size:11px; color:#94a3b8;"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <h3>📂 Arquivos Gerados</h3>
                <div id="fileExplorer" class="explorer"></div>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>

<script>
// ============================================================
// SISTEMA DE PERSISTÊNCIA DE ESTADO - ANIGEEK NEWS v2.0
// Mantém o contexto do usuário mesmo após atualização da página
// ============================================================
(function() {
    const PERSISTENCE_KEYS = {
        STATE: 'anigeek_persistence_v2',
        SESSION_TS: 'anigeek_session_ts_v2',
        VISITOR_ID: 'anigeek_vid_v2'
    };
    
    const STATE_DEFAULTS = {
        scrollY: 0,
        activeTabId: 'manchetes', // Aba padrão
        drawerOpen: false,
        newsLoaded: 5,
        lastArticleId: null,
        timestamp: Date.now()
    };

    // Gera ou recupera ID único do visitante
    function getVisitorId() {
        let vid = localStorage.getItem(PERSISTENCE_KEYS.VISITOR_ID);
        if (!vid) {
            vid = crypto.randomUUID ? crypto.randomUUID() : 'visitor-' + Date.now() + '-' + Math.floor(Math.random() * 10000);
            localStorage.setItem(PERSISTENCE_KEYS.VISITOR_ID, vid);
        }
        return vid;
    }

    // Salva estado atual
    function saveState() {
        try {
            const state = {
                scrollY: window.scrollY,
                activeTabId: document.querySelector('#filterScroller .filter-tag.active')?.dataset?.id || STATE_DEFAULTS.activeTabId,
                drawerOpen: document.getElementById('ag-drawer')?.classList.contains('open') || false,
                newsLoaded: window.noticiasExibidas || STATE_DEFAULTS.newsLoaded,
                lastArticleId: window.lastArticleId || null,
                timestamp: Date.now()
            };
            
            localStorage.setItem(PERSISTENCE_KEYS.STATE, JSON.stringify(state));
            localStorage.setItem(PERSISTENCE_KEYS.SESSION_TS, Date.now().toString());
            
            // Debug opcional (remover em produção)
            // console.log('Estado salvo:', state);
        } catch (e) {
            console.warn('Erro ao salvar estado:', e);
        }
    }

    // Carrega estado salvo
    function loadState() {
        try {
            const savedStateStr = localStorage.getItem(PERSISTENCE_KEYS.STATE);
            if (!savedStateStr) return null;
            
            const savedState = JSON.parse(savedStateStr);
            const sessionTs = parseInt(localStorage.getItem(PERSISTENCE_KEYS.SESSION_TS) || '0');
            const now = Date.now();
            
            // Só restaura se foi nos últimos 45 minutos
            if (now - sessionTs > 45 * 60 * 1000) {
                localStorage.removeItem(PERSISTENCE_KEYS.STATE);
                localStorage.removeItem(PERSISTENCE_KEYS.SESSION_TS);
                return null;
            }
            
            return {...STATE_DEFAULTS, ...savedState};
        } catch (e) {
            console.warn('Erro ao carregar estado:', e);
            return null;
        }
    }

    // Restaura estado da sessão anterior
    function restoreState() {
        const state = loadState();
        if (!state) return;
        
        // Restaura scroll position com suavidade
        if (state.scrollY > 0) {
            window.scrollTo({ top: state.scrollY, behavior: 'auto' });
        }
        
        // Restaura aba ativa após inicialização do sistema de abas
        if (state.activeTabId) {
            const restoreTab = (attempts = 0) => {
                const tabBtn = document.querySelector(`#filterScroller .filter-tag[data-id="${state.activeTabId}"]`);
                if (tabBtn && !tabBtn.classList.contains('active')) {
                    // Remove ativação de outras abas
                    document.querySelectorAll('#filterScroller .filter-tag').forEach(b => b.classList.remove('active'));
                    // Ativa aba salva
                    tabBtn.classList.add('active');
                    // Dispara evento de clique para carregar conteúdo
                    tabBtn.click();
                    console.log('Aba restaurada:', state.activeTabId);
                } else if (attempts < 15) {
                    // Tenta novamente a cada 100ms (até 1.5s)
                    setTimeout(() => restoreTab(attempts + 1), 100);
                }
            };
            setTimeout(restoreTab, 300);
        }
        
        // Restaura estado do drawer (menu engrenagem)
        if (state.drawerOpen) {
            const restoreDrawer = (attempts = 0) => {
                const drawer = document.getElementById('ag-drawer');
                const gearBtn = document.querySelector('#filterScroller .cfg-btn');
                if (drawer && gearBtn && !drawer.classList.contains('open')) {
                    gearBtn.click();
                    console.log('Drawer restaurado: aberto');
                } else if (attempts < 10) {
                    setTimeout(() => restoreDrawer(attempts + 1), 150);
                }
            };
            setTimeout(restoreDrawer, 400);
        }
        
        // Restaura último artigo visualizado
        if (state.lastArticleId) {
            const restoreArticle = (attempts = 0) => {
                const article = document.getElementById(`artigo-${state.lastArticleId}`);
                if (article) {
                    // Destaque suave
                    article.classList.add('destacado');
                    setTimeout(() => article.classList.remove('destacado'), 2500);
                    
                    // Scroll suave até o artigo (se não estiver visível)
                    const rect = article.getBoundingClientRect();
                    if (rect.top < 0 || rect.bottom > window.innerHeight) {
                        article.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                    console.log('Artigo destacado:', state.lastArticleId);
                } else if (attempts < 20) {
                    setTimeout(() => restoreArticle(attempts + 1), 200);
                }
            };
            setTimeout(restoreArticle, 600);
        }
        
        // Restaura número de notícias carregadas
        if (state.newsLoaded && state.newsLoaded > 5) {
            window.noticiasExibidas = state.newsLoaded;
            console.log('Notícias carregadas restauradas:', state.newsLoaded);
        }
    }

    // Inicialização do sistema de persistência
    function initPersistence() {
        // Gera ID único do visitante na primeira visita
        getVisitorId();
        
        // Restaura estado ao carregar a página
        document.addEventListener('DOMContentLoaded', () => {
            restoreState();
            
            // Salva estado periodicamente
            setInterval(saveState, 15000); // A cada 15 segundos
            
            // Salva ao sair da página
            window.addEventListener('beforeunload', saveState);
            
            // Salva ao rolar (com throttle)
            let scrollTimeout;
            window.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(saveState, 400);
            });
            
            // Salva ao interagir com elementos críticos
            document.addEventListener('click', (e) => {
                const target = e.target;
                // Abas de filtro
                if (target.closest('.filter-tag:not(.cfg-btn)')) {
                    setTimeout(saveState, 150);
                }
                // Botão de engrenagem
                if (target.closest('.cfg-btn')) {
                    setTimeout(saveState, 350); // Espera animação do drawer
                }
                // Botão "Carregar mais"
                if (target.closest('.btn-paginacao-geek')) {
                    setTimeout(saveState, 200);
                }
                // Artigos (para tracking de último visualizado)
                if (target.closest('.destaque-secao')) {
                    const article = target.closest('.destaque-secao');
                    if (article.id) {
                        window.lastArticleId = article.id.replace('artigo-', '');
                        setTimeout(saveState, 100);
                    }
                }
            });
            
            // Monitora mudanças no drawer
            const drawer = document.getElementById('ag-drawer');
            if (drawer) {
                const observer = new MutationObserver(() => {
                    if (drawer.classList.contains('open') || !drawer.classList.contains('open')) {
                        saveState();
                    }
                });
                observer.observe(drawer, { attributes: true, attributeFilter: ['class'] });
            }
            
            console.log('Sistema de persistência AniGeek inicializado');
        });
    }

    // Inicia o sistema assim que possível
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPersistence);
    } else {
        initPersistence();
    }
})();
</script>

<script>
window.abrirModalNoticia = (noticia) => {
    if (!noticia || !noticia.id) return;
    const alvo = document.getElementById(noticia.id);
    if (!alvo) return;
    history.pushState(null, '', `#${noticia.id}`);
    alvo.scrollIntoView({ behavior: 'smooth', block: 'start' });
    
    // Salva ID do artigo para persistência
    window.lastArticleId = noticia.id;
    if (typeof saveState === 'function') saveState();
};

window.addEventListener('load', () => {
    const hash = window.location.hash.replace('#', '');
    if (!hash) return;
    const alvo = document.getElementById(hash);
    if (alvo) {
        setTimeout(() => {
            alvo.scrollIntoView({ behavior: 'smooth' });
            // Destaca o artigo
            alvo.classList.add('destacado');
            setTimeout(() => alvo.classList.remove('destacado'), 2500);
        }, 300);
    }
    
    // Inicializa barra de progresso
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const scrollPercent = (scrollTop / docHeight) * 100;
        
        // Suaviza a animação
        if (Math.abs(scrollTop - lastScroll) > 5) {
            document.getElementById('progress-bar').style.width = `${scrollPercent}%`;
            lastScroll = scrollTop;
        }
    });
});
</script>

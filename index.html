<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniGeekNews | Jornalismo Geek</title>
    
    <script id="aclib" type="text/javascript" src="https://acscdn.com/script/aclib.js"></script>

    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

    <style>
        /* AJUSTE DO BOTÃO DE VISITAR SITE (Click-through) */
        /* Movemos o botão do centro para o canto superior direito, de forma discreta */
        .fluid_video_wrapper .vast_video_clickthrough_layer {
            width: auto !important;
            height: auto !important;
            top: 10px !important;
            right: 10px !important;
            left: auto !important;
            bottom: auto !important;
            background: rgba(0, 0, 0, 0.6) !important;
            border-radius: 4px !important;
            padding: 5px 10px !important;
            font-size: 12px !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            display: block !important; /* Garante que ele apareça */
        }

        /* Estiliza o texto dentro do botão de visita */
        .fluid_video_wrapper .fluid_vast_ad_clickthrough {
            position: relative !important;
            top: 0 !important;
            left: 0 !important;
            transform: none !important;
            color: #fff !important;
            text-decoration: none !important;
            font-weight: bold !important;
        }

        /* Estilo do botão de Pular (Skip) para combinar */
        .fluid_video_wrapper .skip_button {
            background: rgba(0, 0, 0, 0.7) !important;
            border: 1px solid #fff !important;
            border-radius: 4px !important;
        }

        #container-player-vast {
            position: relative;
            background: #000;
            margin: 0 auto;
        }
    </style>

    <script type="text/javascript">
        window.addEventListener('load', function() {
            if (typeof aclib !== 'undefined') {
                aclib.runVideoSlider({ zoneId: '10852682' });
                aclib.runAutoTag({ zoneId: '9mhglrdbus' });
            }

            var videoPlayer = fluidPlayer('video-vast-adcash', {
                layoutControls: {
                    fillToContainer: true,
                    autoPlay: true, 
                    mute: true,     
                    playButtonShowing: true,
                    logo: {
                        imageUrl: null, // Remove logo do player se houver
                    }
                },
                vastOptions: {
                    adList: [
                        {
                            roll: 'preRoll',
                            vastTag: 'https://youradexchange.com/video/select.php?r=10852746'
                        }
                    ],
                    adText: 'Publicidade',
                    skipButtonCaption: 'Pular em [seconds]',
                    skipButtonClickCaption: 'Pular'
                }
            });
        });
    </script>

    <meta name="description" content="Jornalismo independente sobre cultura pop, animes, games e cinema.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="estilos/geral.css">
    <link rel="stylesheet" href="estilos/cabecalho-rodape.css">
    <link rel="stylesheet" href="estilos/componentes.css">
</head>
<body>
    
    <div id="progress-bar"></div>

    <div class="sticky-header-group">
        <header>
            <div class="nav-container">
                <a href="./index.html" class="logo">AniGeeknewsv3.com<span></span></a>
                <ul class="nav-menu">
                    <li class="nav-item"><a href="#">Animes</a></li>
                    <li class="nav-item"><a href="#">Games</a></li>
                    <li class="nav-item"><a href="#">Mangás</a></li>
                    <li class="nav-item" id="area-usuario"><span>Aguardando...</span></li>
                </ul>
                <div class="header-actions">
                    <button class="sections-btn" onclick="toggleMobileMenu()">
                        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
                    </button>
                    <button class="menu-toggle" onclick="toggleMobileMenu()">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </header>

        <div id="publicidade-topo-wrapper" style="width: 100%; display: flex; flex-direction: column; align-items: center; padding: 10px 0; background: var(--bg-body); gap: 15px;">
            
            <div id="banner-topo-geek" style="width: 728px; height: 90px; background: rgba(0,0,0,0.05); position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                <span style="position: absolute; top: 0; font-size: 8px; opacity: 0.5;">PUBLICIDADE</span>
                <script type="text/javascript">
                    if (typeof aclib !== 'undefined') { aclib.runBanner({ zoneId: '10852726' }); }
                </script>
            </div>

            <div id="container-player-vast" style="width: 95%; max-width: 728px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden;">
                <video id="video-vast-adcash">
                    <source src="" type="video/mp4" />
                </video>
            </div>

        </div>

        <div class="search-bar-wrapper">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="input-busca-global" placeholder="Pesquisar notícias, animes ou análises..." autocomplete="off">
            </div>
            <div id="search-results-surface"></div>
        </div>
        <div class="filter-scroller" id="filterScroller"></div>
    </div>

    <main id="dynamic-content">
        <section class="hero">
            <div id="conteudo_de_destaque">
                <p style="text-align: center; padding-top: 100px; color: var(--text-muted);">Iniciando portal...</p>
            </div>
        </section>
    </main>

    <div class="mobile-menu" id="mobileMenu">
        <button class="close-menu" onclick="toggleMobileMenu()">×</button>
        <div id="container-menu-perfil"></div>
        <div class="mobile-menu-item"><a href="./index.html">Início</a></div>
        <div class="mobile-menu-item"><a href="#">Animes</a></div>
        <div class="mobile-menu-item"><a href="#">Games</a></div>
        <div class="mobile-menu-item"><a href="#">Mangás</a></div>
        <div class="theme-toggle-container" style="margin-top: 20px;">
            <span id="mobileThemeLabel" style="font-weight: bold; font-size: 12px;">TEMA ESCURO</span>
            <label class="theme-toggle">
                <input type="checkbox" id="mobileThemeToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="modal-noticia-global" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:99999; overflow-y:auto; backdrop-filter: blur(8px);">
        <div id="modal-conteudo-interno" style="background: var(--bg, #fff); color: var(--text-main, #121212); max-width: 900px; margin: 20px auto; padding: 25px; border-radius: 12px; position: relative;">
            <button onclick="window.fecharModalGlobal()" style="position: absolute; top: 15px; right: 15px; border: none; background: rgba(0,0,0,0.05); width: 35px; height: 35px; border-radius: 50%; font-size: 20px; cursor: pointer;">&times;</button>
            <div id="m-categoria" style="font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;"></div>
            <h2 id="m-titulo" style="font-size: clamp(22px, 5vw, 36px); font-weight: 850; margin-bottom: 15px;"></h2>
            <p id="m-resumo" style="font-size: 16px; line-height: 1.6; opacity: 0.8; margin-bottom: 20px;"></p>
            <div id="m-ficha" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; background: rgba(0,0,0,0.03); padding: 15px; border-radius: 8px; margin-bottom: 20px;"></div>
            <iframe id="m-video" style="width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px;" allowfullscreen></iframe>
            <div style="margin-top: 25px; text-align: center;">
                <a id="m-link" href="#" target="_blank" style="display: inline-block; padding: 12px 25px; background: var(--text-main); color: var(--bg); text-decoration: none; font-weight: 700; border-radius: 4px; text-transform: uppercase;">Ver Artigo Completo</a>
            </div>
        </div>
    </div>

    <script type="module" src="scripts/config-firebase.js"></script>
    <script type="module" src="scripts/tema.js"></script>
    <script type="module" src="scripts/navegacao.js"></script>
    <script type="module" src="scripts/busca.js"></script>
    <script src="scripts/recomendacao-secao.js"></script>

    <script>
        window.abrirModalNoticia = (noticia) => {
            const modal = document.getElementById('modal-noticia-global');
            if (!modal) return;
            document.getElementById('m-categoria').innerText = noticia.categoria || "Geek";
            document.getElementById('m-categoria').style.color = noticia.cor || "var(--primary)";
            document.getElementById('m-titulo').innerText = noticia.titulo;
            document.getElementById('m-resumo').innerText = noticia.resumo || "";
            document.getElementById('m-video').src = noticia.videoPrincipal || "";
            document.getElementById('m-link').href = noticia.linkArtigo || "#";
            const fichaContainer = document.getElementById('m-ficha');
            if (noticia.ficha && noticia.ficha.length > 0) {
                fichaContainer.style.display = 'grid';
                fichaContainer.innerHTML = noticia.ficha.map(item => `
                    <div style="border-left: 3px solid ${noticia.cor || '#eee'}; padding-left: 10px;">
                        <div style="font-size: 9px; text-transform: uppercase; font-weight: 800; opacity: 0.5;">${item.label}</div>
                        <div style="font-size: 13px; font-weight: 700;">${item.valor}</div>
                    </div>`).join('');
            } else { fichaContainer.style.display = 'none'; }
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        };

        window.fecharModalGlobal = () => {
            document.getElementById('modal-noticia-global').style.display = 'none';
            document.getElementById('m-video').src = "";
            document.body.style.overflow = 'auto';
        };
    </script>
    <script type="module" src="scripts/ads-industrial.js"></script>
</body>
</html>

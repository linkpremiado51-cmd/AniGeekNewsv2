<script>
    /**
     * BLOCO DE RECUPERAÇÃO IMEDIATA (Anti-Flicker)
     * Executa antes do carregamento do body para preparar variáveis e altura.
     */
    (function() {
        try {
            const saved = localStorage.getItem('anigeek_persistence_v2');
            if (saved) {
                const state = JSON.parse(saved);
                // Define globalmente para as seções lerem
                if (state.newsLoaded) window.noticiasExibidas = state.newsLoaded;
                
                // Pré-ajuste de scroll para evitar que a página comece no topo e pule
                if (state.scrollY > 0) {
                    window.scrollTo(0, state.scrollY);
                }
            }
        } catch (e) {}
    })();
</script>

<script>
/**
 * SISTEMA DE PERSISTÊNCIA DE SESSÃO V2
 */
(function() {
    const PERSISTENCE_KEYS = {
        STATE: 'anigeek_persistence_v2',
        SESSION_TS: 'anigeek_session_ts_v2'
    };
    
    function saveState() {
        try {
            const activeTab = document.querySelector('#filterScroller .filter-tag.active');
            const state = {
                scrollY: window.scrollY,
                activeTabId: activeTab ? activeTab.dataset.section : 'manchetes',
                newsLoaded: window.noticiasExibidas || 5,
                lastArticleId: window.lastArticleId || null,
                timestamp: Date.now()
            };
            localStorage.setItem(PERSISTENCE_KEYS.STATE, JSON.stringify(state));
            localStorage.setItem(PERSISTENCE_KEYS.SESSION_TS, Date.now().toString());
        } catch (e) {}
    }

    function loadState() {
        try {
            const saved = localStorage.getItem(PERSISTENCE_KEYS.STATE);
            if (!saved) return null;
            const state = JSON.parse(saved);
            const ts = parseInt(localStorage.getItem(PERSISTENCE_KEYS.SESSION_TS) || '0');
            // Expira após 45 minutos de inatividade
            if (Date.now() - ts > 45 * 60 * 1000) return null;
            return state;
        } catch (e) { return null; }
    }

    function restoreState() {
        const state = loadState();
        if (!state) return;

        // 1. Aplica a quantidade de notícias global
        if (state.newsLoaded) window.noticiasExibidas = state.newsLoaded;

        // 2. Restaura Aba Ativa
        if (state.activeTabId) {
            const checkTab = setInterval(() => {
                const tab = document.querySelector(`.filter-tag[data-section="${state.activeTabId}"]`);
                if (tab) {
                    clearInterval(checkTab);
                    if (!tab.classList.contains('active')) tab.click();
                }
            }, 100);
            setTimeout(() => clearInterval(checkTab), 3000);
        }

        // 3. Restaura Posição de Leitura e Artigo Específico
        const perseguirArtigo = (attempts = 0) => {
            const article = state.lastArticleId ? document.getElementById(`artigo-${state.lastArticleId}`) : null;
            const btnMais = document.getElementById('btn-carregar-mais');

            if (article) {
                article.scrollIntoView({ behavior: 'instant', block: 'center' });
                article.classList.add('destacado');
            } else if (btnMais && btnMais.offsetParent !== null && attempts < 10) {
                // Se o artigo não está aqui mas o botão sim, o usuário carregou mais notícias antes
                btnMais.click();
                setTimeout(() => perseguirArtigo(attempts + 1), 600);
            } else if (state.scrollY > 0) {
                // Se não há artigo específico, apenas restaura os pixels do scroll
                window.scrollTo({ top: state.scrollY, behavior: 'instant' });
            }
        };

        // Delay para garantir que o Firebase injetou o primeiro lote
        setTimeout(perseguirArtigo, 1500);
    }

    document.addEventListener('DOMContentLoaded', () => {
        restoreState();
        // Autosave a cada 5 segundos ou no scroll
        setInterval(saveState, 5000);
        window.addEventListener('scroll', () => {
            clearTimeout(window.scTimer);
            window.scTimer = setTimeout(saveState, 500);
        });
    });

    window.saveStateGlobal = saveState;
})();
</script>

<script>
// Barra de Progresso de Leitura
window.addEventListener('load', () => {
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const scrollPercent = (scrollTop / docHeight) * 100;
        if (Math.abs(scrollTop - lastScroll) > 5) {
            document.getElementById('progress-bar').style.width = `${scrollPercent}%`;
            lastScroll = scrollTop;
        }
    });
});
</script>
